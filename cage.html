<!DOCTYPE html>
<html>
<head>
  <title>Lock Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
body { 
  font-family: Arial; 
  padding: 20px; 
}

h2 { 
  margin-top: 40px; 
}

.card {
  border: 1px solid #ddd;
  padding: 15px;
  margin-top: 10px;
}

.big {
  font-size: 22px;
  font-weight: bold;
  margin-top: 5px;
}

.status-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  align-items: center;
}

table {
  border-collapse: collapse;
  width: 100%;
  margin-top: 10px;
}

th, td {
  border: 1px solid #ddd;
  padding: 8px;
  text-align: left;
}

th { 
  background-color: #f5f5f5; 
}
.status-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 20px;
  margin-top: 10px;
}

.card {
  border: 1px solid #ddd;
  padding: 15px;
}

.center {
  text-align: center;
}

.label {
  font-size: 13px;
  color: #666;
  margin-bottom: 6px;
}

.big {
  font-size: 22px;
  font-weight: bold;
}

#currentPanty img {
  max-width: 120px;
  border-radius: 8px;
  margin-bottom: 6px;
}
.locked {
  color: #2e7d32;
}

.unlocked {
  color: #c62828;
}
  </style>
</head>
<body>
<h1>Lock Tracker</h1>

<h2>Status</h2>

<div class="status-row">

  <div class="card center">
    <div class="label">Are you locked?</div>
    <div id="lockStatus" class="big">Checking...</div>
  </div>

  <div class="card center">
    <div class="label">Current Session</div>
    <div id="timer" class="big"></div>
  </div>

  <div class="card center">
    <div class="label">Currently Wearing</div>
    <div id="currentPanty"></div>
  </div>

</div>

<h2>This Week</h2>
<div id="weekStats"></div>

<h2>This Month</h2>
<div id="monthStats"></div>

<h2>Top 10 Longest Sessions</h2>
<table id="topTable">
  <thead>
    <tr>
      <th>Date</th>
      <th>Duration</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<h2>Monthly Summary</h2>
<table id="monthlyTable">
  <thead>
    <tr>
      <th>Month</th>
      <th>Sessions</th>
      <th>Total Time</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
const client = window.supabase.createClient(
  'https://rkocfrsaeeyxgfdxeiqz.supabase.co',
  'sb_publishable_yp7myP1S5wmYLQrgwNWxhg_IfZHdeZj'
);

if (isLocked) {
  lockStatus.textContent = "Yes";
  lockStatus.className = "big locked";
} else {
  lockStatus.textContent = "No";
  lockStatus.className = "big unlocked";
}

function formatTime(seconds) {
  seconds = Math.floor(seconds);
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = seconds % 60;
  return `${h}h ${m}m ${s}s`;
}

function formatClock(seconds) {
  seconds = Math.floor(seconds);
  const h = String(Math.floor(seconds / 3600)).padStart(2,'0');
  const m = String(Math.floor((seconds % 3600)/60)).padStart(2,'0');
  const s = String(seconds % 60).padStart(2,'0');
  return `${h}:${m}:${s}`;
}

async function loadStatus() {
  const { data } = await client
    .from('focus_sessions')
    .select('*')
    .is('end_time', null)
    .order('start_time', { ascending: false })
    .limit(1);

  if (data.length > 0) {
    document.getElementById('lockStatus').innerText = "Yes";
    const started = new Date(data[0].start_time);

    setInterval(() => {
      const now = new Date();
      const seconds = (now - started) / 1000;
      document.getElementById('timer').innerText = formatClock(seconds);
    }, 1000);

  } else {
    document.getElementById('lockStatus').innerText = "No";
    document.getElementById('timer').innerText = "--:--:--";
  }
}

async function loadWeekStats() {
  const startOfWeek = new Date();
  startOfWeek.setDate(startOfWeek.getDate() - startOfWeek.getDay());
  startOfWeek.setHours(0,0,0,0);

  const { data } = await client
    .from('focus_sessions')
    .select('*')
    .gte('start_time', startOfWeek.toISOString())
    .not('end_time','is',null);

  let totalSeconds = 0;

  data.forEach(row => {
    const start = new Date(row.start_time);
    const end = new Date(row.end_time);
    totalSeconds += (end - start) / 1000;
  });

  document.getElementById('weekStats').innerHTML =
    `Sessions: <strong>${data.length}</strong><br>
     Total Time: <strong>${formatTime(totalSeconds)}</strong>`;
}

async function loadMonthStats() {
  const startOfMonth = new Date();
  startOfMonth.setDate(1);
  startOfMonth.setHours(0,0,0,0);

  const { data } = await client
    .from('focus_sessions')
    .select('*')
    .gte('start_time', startOfMonth.toISOString())
    .not('end_time','is',null);

  let totalSeconds = 0;

  data.forEach(row => {
    const start = new Date(row.start_time);
    const end = new Date(row.end_time);
    totalSeconds += (end - start) / 1000;
  });

  document.getElementById('monthStats').innerHTML =
    `Sessions: <strong>${data.length}</strong><br>
     Total Time: <strong>${formatTime(totalSeconds)}</strong>`;
}

async function loadTop10() {
  const { data } = await client
    .from('focus_sessions')
    .select('*')
    .not('end_time','is',null);

  const sessions = data.map(row => {
    const start = new Date(row.start_time);
    const end = new Date(row.end_time);
    return {
      date: start.toISOString().split('T')[0],
      duration: (end - start) / 1000
    };
  });

  sessions.sort((a,b) => b.duration - a.duration);

  const tbody = document.querySelector('#topTable tbody');
  sessions.slice(0,10).forEach(s => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${s.date}</td><td>${formatTime(s.duration)}</td>`;
    tbody.appendChild(tr);
  });
}

async function loadMonthlySummary() {
  const { data } = await client
    .from('focus_sessions')
    .select('*')
    .not('end_time','is',null);

  const months = {};

  data.forEach(row => {
    const start = new Date(row.start_time);
    const end = new Date(row.end_time);
    const key = `${start.getFullYear()}-${String(start.getMonth()+1).padStart(2,'0')}`;
    const duration = (end - start) / 1000;

    if (!months[key]) {
      months[key] = { sessions: 0, total: 0 };
    }

    months[key].sessions++;
    months[key].total += duration;
  });

  const tbody = document.querySelector('#monthlyTable tbody');

  Object.keys(months)
    .sort()
    .reverse()
    .forEach(month => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${month}</td>
        <td>${months[month].sessions}</td>
        <td>${formatTime(months[month].total)}</td>
      `;
      tbody.appendChild(tr);
    });
}

const wearingKey = 'currentPanty';

async function loadCurrentPanty() {
  const { data, error } = await client
    .from('wear_history')
    .select(`
      worn_at,
      created_at,
      panties (
        id,
        image_url,
        name
      )
    `)
    .order('worn_at', { ascending: false })
    .order('created_at', { ascending: false })
    .limit(1);

  if (error) {
    console.error(error);
    return;
  }

  if (data && data.length > 0) {
    const panty = data[0].panties;

    document.getElementById('currentPanty').innerHTML = `
      <img src="${panty.image_url}" style="max-width:150px; border-radius:8px;" />
      <div style="margin-top:8px;">${panty.name}</div>
    `;
  } else {
    document.getElementById('currentPanty').textContent = 'None found';
  }
}

async function init() {
  await loadStatus();
loadCurrentPanty();
  await loadWeekStats();
  await loadMonthStats();
  await loadTop10();
  await loadMonthlySummary();
}

init();
</script>
</body>
</html>
